<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>社内打ち合わせ予約システム</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">

  <!-- ===== LOGIN ===== -->
  <div id="view-login" class="login-screen">
    <div class="login-card">
      <div class="login-header">
        <div class="login-icon">M</div>
        <h1>打ち合わせ予約システム</h1>
        <p class="login-sub">社内向け日程調整・予約管理プラットフォーム</p>
      </div>
      <form id="login-form" novalidate>
        <div class="form-field">
          <label for="login-email">メールアドレス</label>
          <input type="email" id="login-email" placeholder="your@company.com" autocomplete="email">
        </div>
        <div class="form-field">
          <label for="login-password">パスワード</label>
          <input type="password" id="login-password" placeholder="パスワード" autocomplete="current-password">
        </div>
        <div id="login-error" class="error-msg" style="display:none"></div>
        <button type="submit" class="btn btn-primary w-full">ログイン</button>
      </form>
      <div class="demo-section">
        <p class="demo-label">― デモアカウント ―</p>
        <div class="demo-btns">
          <button class="demo-btn" data-email="admin@company.com" data-pass="admin123">
            <span class="role-badge role-admin">管理者</span>
            <span>田中 太郎</span>
          </button>
          <button class="demo-btn" data-email="yamada@company.com" data-pass="pass123">
            <span class="role-badge role-management">マネジメント部</span>
            <span>山田 花子</span>
          </button>
          <button class="demo-btn" data-email="suzuki@company.com" data-pass="pass123">
            <span class="role-badge role-engineer">エンジニア</span>
            <span>鈴木 一郎</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== APP SHELL ===== -->
  <div id="app-shell" class="app-shell" style="display:none">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="brand-icon">M</div>
        <div class="brand-text">
          <div class="brand-name">MeetReserve</div>
          <div class="brand-sub">社内予約システム</div>
        </div>
      </div>
      <nav id="sidebar-nav" class="sidebar-nav"></nav>
      <div class="sidebar-user">
        <div class="user-avatar" id="user-avatar">?</div>
        <div class="user-details">
          <div class="user-name" id="user-name">-</div>
          <div class="user-role" id="user-role-label">-</div>
        </div>
        <button id="logout-btn" class="logout-btn" title="ログアウト">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </button>
      </div>
    </aside>

    <!-- Content Area -->
    <div class="content-area">
      <header class="content-header">
        <div>
          <h2 id="page-title" class="page-title"></h2>
          <p id="page-subtitle" class="page-subtitle"></p>
        </div>
        <div id="header-actions" class="header-actions"></div>
      </header>
      <main id="main-content" class="main-content"></main>
    </div>
  </div>

  <!-- ===== MODAL ===== -->
  <div id="modal-overlay" class="modal-overlay" style="display:none">
    <div class="modal-box" id="modal-box">
      <div class="modal-header">
        <h3 id="modal-title"></h3>
        <button id="modal-close" class="modal-close-btn">&times;</button>
      </div>
      <div id="modal-body" class="modal-body"></div>
    </div>
  </div>

  <!-- ===== TOAST ===== -->
  <div id="toast-container" class="toast-container"></div>

</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script>
  const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
</script>
<script src="app.js"></script>
</body>
</html>
